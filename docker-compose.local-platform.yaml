services:
  postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - log_statement=all
      - -c
      - log_destination=stderr
      - -c
      - log_duration=on
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wapm
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wapm"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysql_app_db_1:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_DATABASE: stub
    ports:
      - "${MYSQL_APP_DB_1_PORT:-13306}:3306"
    volumes:
      - mysql_app_db_1:/var/lib/mysql
    networks:
      default:
        aliases:
          - mysql-app-db-1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  mysql_app_db_2:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_DATABASE: stub
    ports:
      - "${MYSQL_APP_DB_2_PORT:-13307}:3306"
    volumes:
      - mysql_app_db_2:/var/lib/mysql
    networks:
      default:
        aliases:
          - mysql-app-db-2
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  minio_persistent:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_PERSISTENT_API_PORT:-19100}:9000"
      - "${MINIO_PERSISTENT_CONSOLE_PORT:-19101}:9001"
    volumes:
      - minio_persistent_data:/data
    networks:
      default:
        aliases:
          - minio-persistent
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio_persistent_init:
    image: minio/mc:latest
    depends_on:
      minio_persistent:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      for i in $$(seq 1 60); do
        /usr/bin/mc alias set persistent http://minio-persistent:9000 minioadmin minioadmin && break;
        if [ $$i -eq 60 ]; then echo 'Failed to configure minio_persistent alias' >&2; exit 1; fi;
        sleep 1;
      done;
      /usr/bin/mc mb -p persistent/backend-r2-persistent || true;
      /usr/bin/mc mb -p persistent/backend-r2-temp || true;
      /usr/bin/mc mb -p persistent/backend-app-config-webc || true;
      /usr/bin/mc mb -p persistent/backend-misc-content || true;
      /usr/bin/mc mb -p persistent/backend-packageversion-bindings || true;
      /usr/bin/mc mb -p persistent/backend-packageversion-exes || true;
      /usr/bin/mc mb -p persistent/backend-packageversion-targzs || true;
      /usr/bin/mc mb -p persistent/backend-packageversion-webcs || true;
      /usr/bin/mc mb -p persistent/backend-static-objects || true;
      /usr/bin/mc mb -p persistent/backend-temp-storage || true;
      /usr/bin/mc mb -p persistent/backend-datastore-private || true;
      exit 0;
      "

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_PASSWORD: root
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-18123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-19123}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./local-platform/clickhouse/initdb.d:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile: "262144"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8123/ping | grep -q 'Ok.'"]
      interval: 5s
      timeout: 5s
      retries: 30

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "${LOKI_PORT:-13100}:3100"
    volumes:
      - ./local-platform/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

  vector:
    image: timberio/vector:latest-alpine
    command: ["--config", "/etc/vector/vector.toml"]
    ports:
      - "127.0.0.1:${VECTOR_HTTP_PORT:-19089}:9089"
    volumes:
      - ./local-platform/vector/vector.toml:/etc/vector/vector.toml:ro
    depends_on:
      loki:
        condition: service_started

  backend:
    image: ${BACKEND_IMAGE_REF}
    entrypoint:
      [
        "/usr/bin/bash",
        "-lc",
        "set -a; source /platform/backend.env; set +a; exec /app/sm_be_server",
      ]
    environment:
      AWS_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wapm
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wapm
      REDIS_URL: redis://redis:6379
      SM_BE_CACHE: redis://redis:6379/0
      SM_BE_MSGBUS: redis://redis:6379/1
      SM_BE_DATASTORE_PRIVATE_URI: s3://minioadmin:minioadmin@minio-persistent:9000/backend-datastore-private?style=path&region=us-east-1
      SM_BE_PUBLIC_URL: http://localhost:${BACKEND_HTTP_PORT:-18000}
      SM_BE_FRONTEND_URL: http://localhost:${BACKEND_HTTP_PORT:-18000}
      SM_BE_PRIMARY_APP_DOMAIN: localhost
      LOKI_URI: http://loki:3100
      METRICS_CLICKHOUSE_URL: http://default:root@clickhouse:8123/edge_metrics_local
      DOCKER_BUILDKIT: "1"
      RUST_LOG: info
      SECRET_KEY: local-dev-secret
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "${BACKEND_HTTP_PORT:-18000}:8000"
    volumes:
      - ${RUN_DIR}:/platform
      # Source builds run inside the backend container but use the host Docker
      # daemon, matching the local-dev-env `SOURCE_BUILD_PROVIDER=local_docker`
      # configuration emitted by smbe. The Docker CLI streams build context to
      # the daemon, so the project directory does not need to exist on the host.
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_CLI_PATH:-/usr/bin/docker}:/usr/bin/docker:ro
      - ${DOCKER_BUILDX_PATH}:/usr/libexec/docker/cli-plugins/docker-buildx:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql_app_db_1:
        condition: service_healthy
      mysql_app_db_2:
        condition: service_healthy
      minio_persistent_init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      vector:
        condition: service_started

  edge:
    build:
      context: ./local-platform/edge-runtime
    user: "0:0"
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        socat TCP-LISTEN:18000,bind=127.0.0.1,fork,reuseaddr TCP:backend:8000 &
        exec /usr/local/bin/edge run --http-port 9080 --https-port 9443 --ssh-port 9022 --data-dir /data -c /config/platform_config.yaml
    volumes:
      - ${RUN_DIR}/artifacts/edge:/usr/local/bin/edge:ro
      - ${RUN_DIR}/edge/platform_config.yaml:/config/platform_config.yaml:ro
      - edge_data:/data
      # Persist expensive Edge package/module caches outside the disposable run
      # volume so CI/local runs can restore them without retaining app state.
      - ${LOCAL_PLATFORM_EDGE_CACHE_DIR}/compiler_cache:/data/compiler_cache
      - ${LOCAL_PLATFORM_EDGE_CACHE_DIR}/webc_cache:/data/webc_cache
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "${EDGE_HTTP_PORT:-19080}:9080"
      - "${EDGE_HTTPS_PORT:-19443}:9443"
      - "${EDGE_NODE_API_PORT:-19050}:9050"
      - "${EDGE_GRPC_PORT:-19051}:9051"
      - "${EDGE_SSH_PORT:-19022}:9022"
      # Edge's local config listens for DNS on port 53 inside the container.
      # Publish the isolated host port directly to that listener.
      - "${EDGE_DNS_PORT:-19053}:53/udp"
    depends_on:
      backend:
        condition: service_started
      vector:
        condition: service_started

volumes:
  postgres_data:
  mysql_app_db_1:
  mysql_app_db_2:
  minio_persistent_data:
  clickhouse_data:
  loki_data:
  edge_data:
