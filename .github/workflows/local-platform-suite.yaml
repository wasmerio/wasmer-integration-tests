name: Local Platform Suite

on:
  workflow_call:
    inputs:
      backend_version:
        type: string
        required: true
        description: "Backend image selector (artifact:<repo>:<run_id>:<name>, resolve_dev, github-release:*, github-artifact:*)."
      edge_version:
        type: string
        required: false
        default: resolve_dev
        description: "Edge binary selector. Defaults to the latest dev release."
      test_branch:
        type: string
        required: false
        default: main
        description: "Branch of wasmerio/wasmer-integration-tests to run the suite from."
      runner:
        type: string
        required: false
        default: depot-ubuntu-24.04-16
        description: "Runner label for the suite jobs. Callers without depot must override (e.g. ubuntu-24.04)."
    secrets:
      pat:
        required: false
        description: "PAT with actions:read on the artifact source repo and contents:read on private release repos."

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: read
  packages: read
  pull-requests: read

jobs:
  test-suite-matrix:
    name: Load integration test suite matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.suites.outputs.matrix }}
    steps:
      - name: Clone integration tests
        uses: actions/checkout@v4
        with:
          repository: wasmerio/wasmer-integration-tests
          ref: ${{ inputs.test_branch }}

      - name: Read shared test suite manifest
        id: suites
        shell: bash
        run: |
          set -euo pipefail
          matrix="$(jq -c '{include: .}' .github/integration-test-suites.json)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  local-platform-cache:
    name: Prepare local platform test environment cache
    uses: wasmerio/wasmer-integration-tests/.github/workflows/local-platform-test.yaml@feat/blocking-integ-test-pipelines
    with:
      backend_version: ${{ inputs.backend_version }}
      edge_version: ${{ inputs.edge_version }}
      test_branch: ${{ inputs.test_branch }}
      prepare_only: true
      suite_id: cache-warmup
      job_name: Prepare local platform test environment cache
      timeout_minutes: 45
      runner: ${{ inputs.runner }}
    secrets:
      pat: ${{ secrets.pat }}

  tests:
    name: Local platform integration test / ${{ matrix.display_id || matrix.id }}
    needs:
      - test-suite-matrix
      - local-platform-cache
    uses: wasmerio/wasmer-integration-tests/.github/workflows/local-platform-test.yaml@feat/blocking-integ-test-pipelines
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.test-suite-matrix.outputs.matrix) }}
    with:
      backend_version: ${{ inputs.backend_version }}
      edge_version: ${{ inputs.edge_version }}
      test_branch: ${{ inputs.test_branch }}
      test_command: ${{ matrix.test_command }}
      suite_id: ${{ matrix.id }}
      job_name: Run ${{ matrix.display_id || matrix.id }} tests
      timeout_minutes: ${{ matrix.timeout_minutes || 45 }}
      runner: ${{ inputs.runner }}
    secrets:
      pat: ${{ secrets.pat }}
