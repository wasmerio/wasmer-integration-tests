name: Local Platform Test

on:
  workflow_call:
    inputs:
      backend_version:
        type: string
        required: true
      edge_version:
        type: string
        required: true
      test_command:
        type: string
        default: pnpm exec jest
      prepare_only:
        type: boolean
        default: false
      suite_id:
        type: string
        default: default
      job_name:
        type: string
        default: ""
      test_branch:
        type: string
        default: main
        description: "Branch of wasmerio/wasmer-integration-tests to check out and run."
      timeout_minutes:
        type: number
        default: 30
        description: >-
          Hard wall-clock cap for this single suite job. Without it the job
          inherits GitHub's 6h default, so a hung deploy (e.g. an autobuild that
          never completes) keeps the runner busy for hours instead of failing
          fast. Mirrors the established integration-test-workflow.yaml cap.
      runner:
        type: string
        default: depot-ubuntu-24.04-16
        description: >-
          Runner label for the suite job. The full local platform stack
          (postgres/redis/edge/backend/clickhouse/loki/vector/minio) plus
          concurrent app builds exhausts a 4-core/16GB GitHub runner — Loki gets
          OOM-pressured and app-log ingestion dies (breaking getAppLogs), and
          heavy concurrent template builds can kill the runner outright. A
          larger depot runner gives the co-resident stack headroom.
    secrets:
      pat:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: read
  packages: read

jobs:
  test:
    name: ${{ inputs.job_name || (inputs.prepare_only && format('Prepare {0} test environment', inputs.suite_id) || format('Run {0} tests', inputs.suite_id)) }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      # Always check out the integration-tests repo itself (public), even when
      # this reusable workflow is called from another repository (e.g. a service
      # building its own image artifact). Without an explicit repository the
      # default checkout would clone the caller's repo instead of the tests.
      - uses: actions/checkout@v4
        with:
          repository: wasmerio/wasmer-integration-tests
          ref: ${{ inputs.test_branch }}
          submodules: true

      # GitHub-hosted runners ship ~14GB of preinstalled toolchains and leave
      # tight headroom for this workload (backend image tar + loaded image,
      # Edge binary, compiler cache, and Docker layers from 13 remote template
      # builds). A cold compiler cache is enough to hit ENOSPC mid-suite, so
      # reclaim the space up front. Skipped on depot runners, which are large
      # and ephemeral.
      - name: Reclaim runner disk space
        if: ${{ !contains(inputs.runner, 'depot') }}
        run: |
          set -euo pipefail
          df -h / | tail -1
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af >/dev/null 2>&1 || true
          df -h / | tail -1

      - name: Install Wasmer CLI
        uses: wasmerio/setup-wasmer@v2

      - name: Log Wasmer CLI version
        run: wasmer --version

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Python for wasmopticon tests
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv for wasmopticon tests
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Ensure uv cache dir exists
        run: mkdir -p "${UV_CACHE_DIR:?}"

      - run: make setup

      # Edge's compiled-module artifacts are only valid for the Edge build that
      # produced them (they live under a per-runtime-hash directory), so the
      # cache key must contain the RESOLVED release tag, not a floating
      # selector like `resolve_dev`. Keying on the selector froze a stale blob
      # under a "hit" key: every job restored it, recompiled all packages
      # (~5 min), and the save step skipped because the key already existed.
      - name: Resolve edge version for cache key
        id: edge-cache-key
        env:
          EDGE_VERSION: ${{ inputs.edge_version }}
          GH_TOKEN: ${{ secrets.pat || github.token }}
        run: |
          set -euo pipefail
          resolved="$EDGE_VERSION"
          case "$EDGE_VERSION" in
            resolve_dev)
              tag="$(gh release list --repo wasmerio/edge --limit 200 --order desc --json tagName --jq '[.[] | select(.tagName | endswith("_dev1"))][0].tagName' 2>/dev/null || true)"
              [ -n "$tag" ] && resolved="$tag"
              ;;
            resolve_prod)
              tag="$(gh release list --repo wasmerio/edge --limit 100 --order desc --json tagName,publishedAt --jq 'sort_by(.publishedAt) | last | .tagName' 2>/dev/null || true)"
              [ -n "$tag" ] && resolved="$tag"
              ;;
          esac
          echo "Edge cache key component: $resolved"
          echo "resolved=$resolved" >> "$GITHUB_OUTPUT"

      - name: Restore local platform package and compiler caches
        id: local-platform-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .local-platform/package-cache
            .local-platform/cache/edge/compiler_cache
            .local-platform/cache/edge/webc_cache
          key: local-platform-v2-${{ runner.os }}-${{ steps.edge-cache-key.outputs.resolved }}-${{ hashFiles('.github/integration-test-suites.json', 'local-platform/package-seed.txt', 'local-platform/package-compilation-list.txt', 'local-platform/scripts/seed-packages.mjs', 'wasmopticon/**/wasmer.toml', 'wordpress/wasmer.toml') }}
          # Prefix fallbacks still help: the package-cache (downloaded webc
          # files) is edge-version-independent, so restoring a neighboring
          # entry saves the package downloads even when compiled artifacts
          # need to be rebuilt for a new Edge release.
          restore-keys: |
            local-platform-v2-${{ runner.os }}-${{ steps.edge-cache-key.outputs.resolved }}-
            local-platform-v2-${{ runner.os }}-

      - name: Log local platform selection
        env:
          BACKEND_VERSION: ${{ inputs.backend_version }}
          EDGE_VERSION: ${{ inputs.edge_version }}
          LOCAL_TEST_COMMAND: ${{ inputs.test_command }}
          LOCAL_PLATFORM_PREPARE_ONLY: ${{ inputs.prepare_only }}
          LOCAL_PLATFORM_SUITE_ID: ${{ inputs.suite_id }}
          HAS_ARTIFACT_FETCH_PAT: ${{ secrets.pat != '' }}
        run: |
          echo "Local platform requested versions:"
          echo "  backend_version=$BACKEND_VERSION"
          echo "  edge_version=$EDGE_VERSION"
          echo "  suite_id=$LOCAL_PLATFORM_SUITE_ID"
          echo "  prepare_only=$LOCAL_PLATFORM_PREPARE_ONLY"
          echo "  test_command=$LOCAL_TEST_COMMAND"
          echo "  artifact_fetch_pat_present=$HAS_ARTIFACT_FETCH_PAT"

      - name: Validate private artifact/release access token
        env:
          BACKEND_VERSION: ${{ inputs.backend_version }}
          EDGE_VERSION: ${{ inputs.edge_version }}
          GH_TOKEN: ${{ secrets.pat }}
        run: |
          set -euo pipefail
          needs_pat=0
          case "$BACKEND_VERSION" in
            github-artifact:*|artifact:*|github-release:*) needs_pat=1 ;;
          esac
          case "$EDGE_VERSION" in
            resolve_dev|latest_dev|latest-dev|github-artifact:*|artifact:*|github-release:*) needs_pat=1 ;;
          esac

          if [ "$needs_pat" = "1" ] && [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::LOCAL_PLATFORM_ARTIFACT_FETCH_PAT is required for private wasmerio/backend artifacts or wasmerio/edge dev releases, but it was not passed to the workflow."
            echo "Create repository/org secret LOCAL_PLATFORM_ARTIFACT_FETCH_PAT and make sure it is available to this repository/event."
            exit 1
          fi

      - name: Skip prepare (exact cache hit)
        if: ${{ inputs.prepare_only && steps.local-platform-cache.outputs.cache-hit == 'true' }}
        run: echo "Exact local-platform cache key already exists; skipping the cache-warmup stack boot."

      # Only boot the disposable stack to warm the caches when the exact cache
      # key is missing. On warm days this turns the ~9-minute prepare gate the
      # whole suite matrix waits on into a ~1-minute no-op.
      - name: Prepare local platform test environment
        if: ${{ inputs.prepare_only && steps.local-platform-cache.outputs.cache-hit != 'true' }}
        env:
          BACKEND_VERSION: ${{ inputs.backend_version }}
          BACKEND_IMAGE_REPOSITORY: ${{ vars.LOCAL_PLATFORM_BACKEND_IMAGE_REPOSITORY  }}
          EDGE_VERSION: ${{ inputs.edge_version }}
          LOCAL_PLATFORM_TEST_TIMEOUT_SECONDS: "7200"
          WASMER_TEST_FETCH_TIMEOUT_MS: "180000"
          GH_TOKEN: ${{ secrets.pat }}
          LOCAL_PLATFORM_ARTIFACT_FETCH_PAT_PRESENT: ${{ secrets.pat != '' }}
        run: make local-platform-prepare

      - name: Run local platform tests
        if: ${{ !inputs.prepare_only }}
        env:
          BACKEND_VERSION: ${{ inputs.backend_version }}
          BACKEND_IMAGE_REPOSITORY: ${{ vars.LOCAL_PLATFORM_BACKEND_IMAGE_REPOSITORY }}
          EDGE_VERSION: ${{ inputs.edge_version }}
          LOCAL_TEST_COMMAND: ${{ inputs.test_command }}
          LOCAL_PLATFORM_TEST_TIMEOUT_SECONDS: "7200"
          WASMER_TEST_FETCH_TIMEOUT_MS: "180000"
          GH_TOKEN: ${{ secrets.pat }}
          LOCAL_PLATFORM_ARTIFACT_FETCH_PAT_PRESENT: ${{ secrets.pat != '' }}
        run: make local-test

      - name: Normalize local platform cache permissions
        if: always() && steps.local-platform-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          for path in \
            .local-platform/package-cache \
            .local-platform/cache/edge/compiler_cache \
            .local-platform/cache/edge/webc_cache
          do
            if [ -e "$path" ]; then
              sudo chown -R "$(id -u):$(id -g)" "$path"
              chmod -R u+rwX,go+rX "$path"
            fi
          done

      - name: Save local platform package and compiler caches
        if: always() && steps.local-platform-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .local-platform/package-cache
            .local-platform/cache/edge/compiler_cache
            .local-platform/cache/edge/webc_cache
          key: ${{ steps.local-platform-cache.outputs.cache-primary-key }}

      - name: Upload local platform logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: local-platform-${{ inputs.suite_id }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .local-platform/current/logs/**
            .local-platform/current/diagnostics/**
            .local-platform/current/resolved.env
            .local-platform/current/resolved.json
          if-no-files-found: error
