name: Code QA
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: read
  packages: read
  pull-requests: read

concurrency:
  group: code-qa
  cancel-in-progress: true

jobs:
  local-platform:
    name: Local platform integration tests
    # Delegates to the shared, service-agnostic suite so this repo's own QA and
    # every downstream service run the exact same matrix + caching.
    #
    # Goal: run both backend and edge on their latest releases. Edge already
    # floats via resolve_dev. Backend floats via resolve_dev too, but that
    # requires a backend dev release that carries an image asset (published by
    # tf-aws-project deploy.yaml once backend `make image-archive` is live). Set
    # the LOCAL_PLATFORM_BACKEND_VERSION repo variable to override (e.g. pin a
    # specific artifact, or flip to 'resolve_dev' once assets are published).
    uses: ./.github/workflows/local-platform-suite.yaml
    with:
      backend_version: ${{ vars.LOCAL_PLATFORM_BACKEND_VERSION || 'github-artifact:wasmerio/backend:backend-v2026-06-10_3_cc147eb_bugt-image' }}
      edge_version: ${{ vars.LOCAL_PLATFORM_EDGE_VERSION || 'resolve_dev' }}
      test_branch: ${{ github.head_ref || github.ref_name }}
      # This repo (public) has no depot runners; reusable jobs run in this
      # caller's context, so override the suite's depot-16 default with a
      # GitHub-hosted runner. Service pipelines (e.g. backend) keep the default.
      runner: ubuntu-24.04
    secrets:
      pat: ${{ secrets.LOCAL_PLATFORM_ARTIFACT_FETCH_PAT }}

  fmt:
    name: File format check
    runs-on: ubuntu-24.04

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Add pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup project
        shell: bash
        run: make setup

      - name: Check prettier
        run: |
          make fmt-check

  lint:
    name: Lint the project
    runs-on: ubuntu-24.04

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Add pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup project
        shell: bash
        run: make setup

      - name: Check tsc and eslint
        run: |
          make check
