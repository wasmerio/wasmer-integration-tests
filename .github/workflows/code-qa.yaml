name: Code QA
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read
  packages: read
  pull-requests: read

concurrency:
  group: code-qa
  cancel-in-progress: true

jobs:
  tests:
    name: Local platform integration test
    # Use CI-produced artifacts by default so Code QA does not need AWS/ECR
    # access or local AWS profiles. Override LOCAL_PLATFORM_*_VERSION for
    # candidate artifacts or emergency pinning.
    uses: ./.github/workflows/local-platform-test.yaml
    with:
      backend_version: ${{ vars.LOCAL_PLATFORM_BACKEND_VERSION || 'github-artifact:wasmerio/backend:backend-v2026-06-10_3_cc147eb_bugt-image' }}
      edge_version: ${{ vars.LOCAL_PLATFORM_EDGE_VERSION || 'resolve_dev' }}
      frontend_version: ${{ vars.LOCAL_PLATFORM_FRONTEND_VERSION || 'none:skipped' }}
      test_command: pnpm exec jest tests/general/sql.test.ts --runInBand --verbose
    secrets:
      pat: ${{ secrets.LOCAL_PLATFORM_ARTIFACT_FETCH_PAT }}

  fmt:
    name: File format check
    runs-on: ubuntu-24.04

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Add pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup project
        shell: bash
        run: make setup

      - name: Check prettier
        run: |
          make fmt-check

  lint:
    name: Lint the project
    runs-on: ubuntu-24.04

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Add pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup project
        shell: bash
        run: make setup

      - name: Check tsc and eslint
        run: |
          make check
