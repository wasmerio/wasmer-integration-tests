name: Code QA
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: read
  packages: read
  pull-requests: read

# Group by ref so each PR/branch gets its own concurrency slot: a new push to
# the SAME ref supersedes its stale run, but runs for other PRs (and their
# long local-platform suites) are never cancelled by unrelated activity.
concurrency:
  group: code-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local-platform:
    name: Local platform integration tests
    # Delegates to the shared, service-agnostic suite so this repo's own QA and
    # every downstream service run the exact same matrix + caching.
    #
    # Versions float — never pin here: a stale pin silently turns the whole
    # suite into a test of old platform code (a June pin hid an already-fixed
    # search bug for weeks). Backend floats to the latest PROD release (more
    # stable); Edge floats to the latest DEV release (those are what ships to
    # prod next). Service pipelines (backend/edge) are the only exception:
    # they call the reusable workflow directly with their release-candidate
    # artifact. Backend resolution prefers a release image asset when present
    # (self-contained; no registry creds needed on the runner); the repo
    # variables remain as a break-glass override only.
    uses: ./.github/workflows/local-platform-suite.yaml
    with:
      backend_version: ${{ vars.LOCAL_PLATFORM_BACKEND_VERSION || 'resolve_prod' }}
      edge_version: ${{ vars.LOCAL_PLATFORM_EDGE_VERSION || 'resolve_dev' }}
      test_branch: ${{ github.head_ref || github.ref_name }}
      # This repo (public) has no depot runners; reusable jobs run in this
      # caller's context, so override the suite's depot-16 default with a
      # GitHub-hosted runner. Service pipelines (e.g. backend) keep the default.
      runner: ubuntu-24.04
    secrets:
      pat: ${{ secrets.LOCAL_PLATFORM_ARTIFACT_FETCH_PAT }}

  fmt:
    name: File format check
    runs-on: ubuntu-24.04

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Add pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup project
        shell: bash
        run: make setup

      - name: Check prettier
        run: |
          make fmt-check

  lint:
    name: Lint the project
    runs-on: ubuntu-24.04

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Add pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup project
        shell: bash
        run: make setup

      - name: Check tsc and eslint
        run: |
          make check
